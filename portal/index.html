<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>运营中台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell" aria-label="运营中台">
    <aside class="sidebar" aria-label="运营平台菜单">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">运</span>
        <div>
          <p class="eyebrow">统一入口</p>
          <h1>运营中台</h1>
        </div>
      </div>

      <nav class="platform-nav" aria-label="运营平台">
        <button class="nav-button is-active" type="button" data-view="home">
          <span class="nav-icon" aria-hidden="true">⌂</span>
          <span>聚合首页</span>
        </button>
        <button class="nav-button" type="button" data-title="猎手运营" data-url="https://czs-ops.github.io/hunter-work-center/">
          <span class="nav-icon" aria-hidden="true">猎</span>
          <span>猎手运营</span>
        </button>
        <button class="nav-button" type="button" data-title="基金运营" data-url="https://0a8f688b91384b68b411969a2ea710c7.app.codebuddy.work">
          <span class="nav-icon" aria-hidden="true">基</span>
          <span>基金运营</span>
        </button>
      </nav>
    </aside>

    <section class="workspace" aria-label="运营内容展示区">
      <section class="portal-home" id="portal-home" aria-label="聚合首页">
        <div class="home-header">
          <p class="eyebrow">运营总览</p>
          <h2>聚合工作台</h2>
          <p>统一承载猎手运营和基金运营。两个平台内容保持独立迭代，聚合页只负责入口和总览。</p>
        </div>

        <div class="overview-grid" aria-label="运营数据总览">
          <article class="overview-card">
            <span class="card-label">运营数据总览</span>
            <strong>待接入</strong>
            <p>后续可汇总关键指标、趋势和异常提醒。</p>
          </article>
          <article class="overview-card">
            <span class="card-label">今日待办工作台</span>
            <strong>待接入</strong>
            <p>后续可汇总两个平台当天需要处理的任务。</p>
          </article>
          <article class="overview-card">
            <span class="card-label">平台状态</span>
            <strong>2 个平台</strong>
            <p>猎手运营、基金运营继续独立运行。</p>
          </article>
        </div>

        <div class="launch-grid" aria-label="平台入口">
          <button class="launch-card hunter-card" type="button" data-title="猎手运营" data-url="https://czs-ops.github.io/hunter-work-center/">
            <span>猎手运营</span>
            <strong>进入平台</strong>
          </button>
          <button class="launch-card fund-card" type="button" data-title="基金运营" data-url="https://0a8f688b91384b68b411969a2ea710c7.app.codebuddy.work">
            <span>基金运营</span>
            <strong>进入平台</strong>
          </button>
        </div>
      </section>

      <iframe class="content-frame" id="content-frame" title="运营内容展示" hidden></iframe>
    </section>
  </main>

  <script>
    const frame = document.getElementById("content-frame");
    const home = document.getElementById("portal-home");
    const navButtons = document.querySelectorAll(".nav-button");

    function setActiveButton(title) {
      navButtons.forEach((button) => {
        const isHome = button.dataset.view === "home" && title === "聚合首页";
        const isPlatform = button.dataset.title === title;
        button.classList.toggle("is-active", isHome || isPlatform);
      });
    }

    function showHome() {
      frame.hidden = true;
      frame.removeAttribute("src");
      home.hidden = false;
      setActiveButton("聚合首页");
    }

    function showPlatform(title, url) {
      home.hidden = true;
      frame.title = title;
      frame.src = url;
      frame.hidden = false;
      setActiveButton(title);
    }

    document.querySelectorAll("[data-url]").forEach((button) => {
      button.addEventListener("click", () => {
        showPlatform(button.dataset.title, button.dataset.url);
      });
    });

    document.querySelector('[data-view="home"]').addEventListener("click", showHome);
  </script>
</body>
</html>
