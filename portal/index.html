<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>运营中台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell" aria-label="运营中台">
    <aside class="sidebar" aria-label="运营平台菜单">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">运</span>
        <div>
          <p class="eyebrow">统一入口</p>
          <h1>运营中台</h1>
        </div>
      </div>

      <nav class="platform-nav" aria-label="运营平台">
        <section class="platform-group">
          <button class="platform-toggle" type="button" aria-expanded="false" aria-controls="hunter-menu">
            <span>猎手运营</span>
            <span class="chevron" aria-hidden="true"></span>
          </button>
          <div class="submenu" id="hunter-menu">
            <button class="submenu-item" type="button" data-title="猎手运营 - 首页" data-url="https://czs-ops.github.io/hunter-work-center/">首页</button>
            <button class="submenu-item" type="button" data-title="猎手运营 - 今日待办" data-url="https://czs-ops.github.io/hunter-work-center/">今日待办</button>
            <button class="submenu-item" type="button" data-title="猎手运营 - 数据摘要" data-url="https://czs-ops.github.io/hunter-work-center/">数据摘要</button>
            <button class="submenu-item" type="button" data-title="猎手运营 - 待确认广告任务" data-url="https://czs-ops.github.io/hunter-work-center/">待确认广告任务</button>
            <button class="submenu-item" type="button" data-title="猎手运营 - 异常提醒" data-url="https://czs-ops.github.io/hunter-work-center/">异常提醒</button>
            <button class="submenu-item" type="button" data-title="猎手运营 - 数据报表" data-url="https://czs-ops.github.io/hunter-work-center/">数据报表</button>
            <button class="submenu-item" type="button" data-title="猎手运营 - 内容创作" data-url="https://czs-ops.github.io/hunter-work-center/">内容创作</button>
            <button class="submenu-item" type="button" data-title="猎手运营 - 用户洞察" data-url="https://czs-ops.github.io/hunter-work-center/">用户洞察</button>
            <button class="submenu-item" type="button" data-title="猎手运营 - 活动策划" data-url="https://czs-ops.github.io/hunter-work-center/">活动策划</button>
            <button class="submenu-item" type="button" data-title="猎手运营 - 智能工作流" data-url="https://czs-ops.github.io/hunter-work-center/">智能工作流</button>
          </div>
        </section>

        <section class="platform-group">
          <button class="platform-toggle" type="button" aria-expanded="false" aria-controls="fund-menu">
            <span>基金运营</span>
            <span class="chevron" aria-hidden="true"></span>
          </button>
          <div class="submenu fund-menu" id="fund-menu">
            <button class="submenu-item" type="button" data-title="基金运营 - 社群概览" data-url="https://0a8f688b91384b68b411969a2ea710c7.app.codebuddy.work">社群概览</button>
            <button class="submenu-item" type="button" data-title="基金运营 - 新人手册" data-url="https://0a8f688b91384b68b411969a2ea710c7.app.codebuddy.work">新人手册</button>
            <button class="submenu-item" type="button" data-title="基金运营 - 知识库" data-url="https://0a8f688b91384b68b411969a2ea710c7.app.codebuddy.work">知识库</button>
            <button class="submenu-item" type="button" data-title="基金运营 - 基金速查" data-url="https://0a8f688b91384b68b411969a2ea710c7.app.codebuddy.work">基金速查</button>
            <button class="submenu-item" type="button" data-title="基金运营 - 周会记录" data-url="https://0a8f688b91384b68b411969a2ea710c7.app.codebuddy.work">周会记录</button>
            <button class="submenu-item" type="button" data-title="基金运营 - 基金活动" data-url="https://0a8f688b91384b68b411969a2ea710c7.app.codebuddy.work">基金活动</button>
            <button class="submenu-item" type="button" data-title="基金运营 - 内容生成" data-url="https://0a8f688b91384b68b411969a2ea710c7.app.codebuddy.work">内容生成</button>
          </div>
        </section>
      </nav>
    </aside>
    <section class="workspace" aria-label="运营内容展示区">
      <div class="empty-state" id="empty-state">
        <h2>请选择左侧栏目</h2>
        <p>内容会在当前页面右侧展示。</p>
      </div>
      <iframe class="content-frame" id="content-frame" title="运营内容展示" hidden></iframe>
    </section>
  </main>

  <script>
    document.querySelectorAll(".platform-toggle").forEach((button) => {
      button.addEventListener("click", () => {
        const isExpanded = button.getAttribute("aria-expanded") === "true";
        button.setAttribute("aria-expanded", String(!isExpanded));
      });
    });

    const frame = document.getElementById("content-frame");
    const emptyState = document.getElementById("empty-state");

    document.querySelectorAll(".submenu-item").forEach((item) => {
      item.addEventListener("click", () => {
        document.querySelectorAll(".submenu-item.is-active").forEach((activeItem) => {
          activeItem.classList.remove("is-active");
        });
        item.classList.add("is-active");
        frame.title = item.dataset.title;
        frame.src = item.dataset.url;
        frame.hidden = false;
        emptyState.hidden = true;
      });
    });
  </script>
</body>
</html>
