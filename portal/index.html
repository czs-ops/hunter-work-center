<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>运营中台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell" aria-label="运营中台">
    <aside class="sidebar" aria-label="运营平台菜单">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">运</span>
        <div>
          <p class="eyebrow">统一入口</p>
          <h1>运营中台</h1>
        </div>
      </div>

      <nav class="platform-nav" aria-label="运营平台">
        <button class="nav-button is-active" type="button" data-view="home">
          <span class="nav-icon" aria-hidden="true">⌂</span>
          <span>聚合首页</span>
        </button>
        <button class="nav-button" type="button" data-title="猎手运营" data-url="https://czs-ops.github.io/hunter-work-center/">
          <span class="nav-icon" aria-hidden="true">猎</span>
          <span>猎手运营</span>
        </button>
        <button class="nav-button" type="button" data-title="基金运营" data-url="https://0a8f688b91384b68b411969a2ea710c7.app.codebuddy.work">
          <span class="nav-icon" aria-hidden="true">基</span>
          <span>基金运营</span>
        </button>
      </nav>
    </aside>

    <section class="workspace" aria-label="运营内容展示区">
      <section class="portal-home" id="portal-home" aria-label="聚合首页"></section>

      <div class="loading-panel" id="loading-panel" hidden>
        <strong id="loading-title">正在打开平台</strong>
      </div>
      <iframe class="content-frame" id="content-frame" title="运营内容展示" hidden></iframe>
    </section>
  </main>

  <script>
    const frame = document.getElementById("content-frame");
    const home = document.getElementById("portal-home");
    const loadingPanel = document.getElementById("loading-panel");
    const loadingTitle = document.getElementById("loading-title");
    const navButtons = document.querySelectorAll(".nav-button");

    function setActiveButton(title) {
      navButtons.forEach((button) => {
        const isHome = button.dataset.view === "home" && title === "聚合首页";
        const isPlatform = button.dataset.title === title;
        button.classList.toggle("is-active", isHome || isPlatform);
      });
    }

    function showHome() {
      frame.hidden = true;
      frame.removeAttribute("src");
      loadingPanel.hidden = true;
      home.hidden = false;
      setActiveButton("聚合首页");
    }

    function showPlatform(title, url) {
      home.hidden = true;
      loadingTitle.textContent = `正在打开${title}`;
      loadingPanel.hidden = false;
      frame.title = title;
      frame.hidden = false;
      frame.src = url;
      setActiveButton(title);
    }

    frame.addEventListener("load", () => {
      loadingPanel.hidden = true;
    });

    document.querySelector(".platform-nav").addEventListener("click", (event) => {
      const button = event.target.closest(".nav-button");
      if (!button) return;

      if (button.dataset.view === "home") {
        showHome();
        return;
      }

      showPlatform(button.dataset.title, button.dataset.url);
    });
  </script>
</body>
</html>
