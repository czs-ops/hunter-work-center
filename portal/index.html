<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>运营中台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell" aria-label="运营中台">
    <aside class="sidebar" aria-label="运营平台菜单">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">运</span>
        <div>
          <p class="eyebrow">统一入口</p>
          <h1>运营中台</h1>
        </div>
      </div>

      <nav class="platform-nav" aria-label="运营平台">
        <button class="nav-button is-active" type="button" data-view="home">
          <span class="nav-icon" aria-hidden="true">⌂</span>
          <span>聚合首页</span>
        </button>
        <button class="nav-button" type="button" data-title="猎手运营" data-frame="hunter-frame">
          <span class="nav-icon" aria-hidden="true">猎</span>
          <span>猎手运营</span>
        </button>
        <button class="nav-button" type="button" data-title="基金运营" data-frame="fund-frame">
          <span class="nav-icon" aria-hidden="true">基</span>
          <span>基金运营</span>
        </button>
      </nav>
    </aside>

    <section class="workspace" aria-label="运营内容展示区">
      <section class="portal-home" id="portal-home" aria-label="聚合首页"></section>

      <div class="status-toast" id="status-toast" hidden>
        <span id="status-title">正在打开平台</span>
      </div>
      <iframe class="content-frame" id="hunter-frame" title="猎手运营" src="https://czs-ops.github.io/hunter-work-center/"></iframe>
      <iframe class="content-frame" id="fund-frame" title="基金运营" src="https://0a8f688b91384b68b411969a2ea710c7.app.codebuddy.work"></iframe>
    </section>
  </main>

  <script>
    const home = document.getElementById("portal-home");
    const statusToast = document.getElementById("status-toast");
    const statusTitle = document.getElementById("status-title");
    const navButtons = document.querySelectorAll(".nav-button");
    const frames = {
      "hunter-frame": document.getElementById("hunter-frame"),
      "fund-frame": document.getElementById("fund-frame")
    };
    const loadedFrames = new Set();
    let activeFrameId = "";
    let statusTimer = 0;

    function setActiveButton(title) {
      navButtons.forEach((button) => {
        const isHome = button.dataset.view === "home" && title === "聚合首页";
        const isPlatform = button.dataset.title === title;
        button.classList.toggle("is-active", isHome || isPlatform);
      });
    }

    function hideFrames() {
      Object.values(frames).forEach((frame) => {
        frame.classList.remove("is-active");
      });
      activeFrameId = "";
    }

    function showHome() {
      hideFrames();
      statusToast.hidden = true;
      home.hidden = false;
      setActiveButton("聚合首页");
    }

    function showStatus(text) {
      window.clearTimeout(statusTimer);
      statusTitle.textContent = text;
      statusToast.hidden = false;
      statusTimer = window.setTimeout(() => {
        statusToast.hidden = true;
      }, 1200);
    }

    function showPlatform(title, frameId) {
      const frame = frames[frameId];
      home.hidden = true;
      hideFrames();
      activeFrameId = frameId;
      frame.title = title;
      frame.classList.add("is-active");
      setActiveButton(title);
      showStatus(loadedFrames.has(frameId) ? `已切换到${title}` : `正在打开${title}`);
    }

    Object.entries(frames).forEach(([frameId, frame]) => {
      frame.addEventListener("load", () => {
        loadedFrames.add(frameId);
        if (activeFrameId === frameId) {
          statusToast.hidden = true;
        }
      });
    });

    document.querySelector(".platform-nav").addEventListener("click", (event) => {
      const button = event.target.closest(".nav-button");
      if (!button) return;

      if (button.dataset.view === "home") {
        showHome();
        return;
      }

      showPlatform(button.dataset.title, button.dataset.frame);
    });
  </script>
</body>
</html>
